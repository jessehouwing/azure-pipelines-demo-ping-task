name: demo-ping-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  publisherId: jessehouwing
  extensionId: azure-pipelines-demo-ping-task
  initialVersion: 1.0.0
  marketplacePatServiceConnection: MarketplacePAT
  organizationUrls: |
    https://dev.azure.com/jessehouwing-dev

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: Setup Node.js
    inputs:
      versionSpec: 20.x

  - task: azdo-marketplace@6
    name: queryVersion
    displayName: Query next patch version
    continueOnError: true
    inputs:
      operation: 'queryVersion'
      connectionType: 'AzureRM'
      connectionNameAzureRm: 'MVP Sponsorship (cec4b369-63dc-49d5-8422-3ed2e63e5f48)'
      publisherId: '$(publisherId)'
      extensionId: '$(extensionId)'
      versionAction: 'patch'

  - pwsh: |
      $version = '$(initialVersion)'
      if ('$(queryVersion.proposedVersion)' -and '$(queryVersion.proposedVersion)' -ne '') {
        $version = '$(queryVersion.proposedVersion)'
      }
      Write-Host "Using extension version: $version"
      Write-Host "##vso[task.setvariable variable=resolvedVersion]$version"
    displayName: Resolve version (query or initial)

  - task: azdo-marketplace@6
    name: package
    displayName: Package VSIX
    inputs:
      operation: 'package'
      publisherId: '$(publisherId)'
      extensionId: '$(extensionId)'
      use: 'manifest'
      manifestFile: 'vss-extension.json'
      extensionVersion: '$(resolvedVersion)'
      extensionVisibility: 'private'
      outputPath: '$(Build.ArtifactStagingDirectory)'
      updateTasksVersion: 'patch'
      updateTasksId: true

  - publish: $(Build.ArtifactStagingDirectory)
    artifact: vsix
    displayName: Upload VSIX artifact

  - task: azdo-marketplace@6
    name: publish
    displayName: Publish from VSIX
    inputs:
      operation: publish
      connectionType: PAT
      connectionNamePAT: $(marketplacePatServiceConnection)
      use: vsix
      vsixFile: $(package.vsixPath)
      noWaitValidation: true

  - task: azdo-marketplace@6
    displayName: Wait for validation
    inputs:
      operation: waitForValidation
      connectionType: PAT
      connectionNamePAT: $(marketplacePatServiceConnection)
      vsixFile: $(package.vsixPath)

  - task: azdo-marketplace@6
    displayName: Share extension
    condition: and(succeeded(), ne(variables['organizationUrls'], ''))
    inputs:
      operation: share
      connectionType: PAT
      connectionNamePAT: $(marketplacePatServiceConnection)
      vsixFile: $(package.vsixPath)
      accounts: $(organizationUrls)

  - task: azdo-marketplace@6
    displayName: Install extension
    condition: and(succeeded(), ne(variables['organizationUrls'], ''))
    inputs:
      operation: install
      connectionType: PAT
      connectionNamePAT: $(marketplacePatServiceConnection)
      vsixFile: $(package.vsixPath)
      accounts: $(organizationUrls)

  - task: azdo-marketplace@6
    displayName: Wait for installation
    condition: and(succeeded(), ne(variables['organizationUrls'], ''))
    inputs:
      operation: waitForInstallation
      connectionType: PAT
      connectionNamePAT: $(marketplacePatServiceConnection)
      accounts: $(organizationUrls)
      vsixFile: $(package.vsixPath)
